<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON COCK 2077</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --pink: #ff1493;
            --purple: #c026d3;
            --orange: #ff4500;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a001f;
            color: #ff99cc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Неоновый фон с частицами */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,20,147,0.15), transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(192,38,211,0.15), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 620px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 62px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--pink), var(--purple), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 80px rgba(255,20,147,0.8);
            margin: 30px 0 10px;
            letter-spacing: -2px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 60px rgba(255,20,147,0.8); }
            to { text-shadow: 0 0 100px rgba(255,20,147,1); }
        }

        .subtitle {
            font-size: 19px;
            opacity: 0.9;
            margin-bottom: 50px;
        }

        .search-box {
            position: relative;
            margin-bottom: 50px;
        }

        input {
            width: 100%;
            padding: 24px 28px;
            font-size: 21px;
            background: rgba(31,31,58,0.85);
            border: 3px solid var(--pink);
            border-radius: 30px;
            color: white;
            box-shadow: 0 0 60px rgba(255,20,147,0.5);
            transition: all 0.4s;
        }

        input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 80px rgba(255,69,0,0.7);
            transform: scale(1.03);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(90deg, var(--pink), var(--orange));
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 21px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 15px 50px rgba(255,20,147,0.7);
            transition: all 0.3s;
        }

        .search-btn:active {
            transform: translateY(-50%) scale(0.92);
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin: 60px 0;
        }

        .cat-card {
            background: rgba(58,31,92,0.75);
            border: 1px solid rgba(255,20,147,0.4);
            padding: 22px 16px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cat-card:hover {
            transform: translateY(-12px) scale(1.08);
            background: rgba(255,20,147,0.25);
            border-color: var(--pink);box-shadow: 0 0 60px rgba(255,20,147,0.8);
        }

        .history {
            margin-top: 70px;
            text-align: left;
        }

        .history h3 {
            color: #ff99cc;
            margin-bottom: 15px;
        }

        .history-item {
            background: rgba(31,31,58,0.8);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .history-item:hover {
            background: rgba(255,20,147,0.25);
            transform: translateX(10px);
        }

        footer {
            margin-top: 100px;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEON COCK</h1>
        <p class="subtitle">Гей-порно поиск 2077 • Яндекс + Pornhub + Xvideos</p>

        <div class="search-box">
            <input type="text" id="query" placeholder="Введи тему... (twink, daddy, bareback, яндекс...)" autofocus>
            <button class="search-btn" onclick="searchAll()">🔥 ПОИСК</button>
        </div>

        <div class="categories">
            <div class="cat-card" onclick="quickSearch('twink')">Twink</div>
            <div class="cat-card" onclick="quickSearch('bear')">Bear</div>
            <div class="cat-card" onclick="quickSearch('daddy')">Daddy</div>
            <div class="cat-card" onclick="quickSearch('bareback')">Bareback</div>
            <div class="cat-card" onclick="quickSearch('creampie')">Creampie</div>
            <div class="cat-card" onclick="quickSearch('rough gay')">Rough</div>
            <div class="cat-card" onclick="quickSearch('big cock')">Big Cock</div>
            <div class="cat-card" onclick="quickSearch('muscle')">Muscle</div>
            <div class="cat-card" onclick="quickSearch('японский гей')">Японский</div>
        </div>

        <div class="history" id="history">
            <h3>Недавние запросы</h3>
        </div>

        <footer>Сделано для максимального удовольствия</footer>
    </div>

    <script>
        const queryInput = document.getElementById('query');
        const historyEl = document.getElementById('history');

        function openAll(theme) {
            const q = encodeURIComponent(theme + " gay porno");
            window.open(`https://yandex.ru/search/?text=${q}`, '_blank');
            setTimeout(() => window.open(`https://www.pornhub.com/gay/video/search?search=${q}`, '_blank'), 400);
            setTimeout(() => window.open(`https://www.xvideos.com/gay?k=${q}`, '_blank'), 850);
        }

        function searchAll() {
            let theme = queryInput.value.trim();
            if (!theme) theme = "hardcore gay";

            saveHistory(theme);
            openAll(theme);
        }

        function quickSearch(cat) {
            queryInput.value = cat;
            searchAll();
        }

        function saveHistory(theme) {
            let hist = JSON.parse(localStorage.getItem('gayHistory') || '[]');
            hist = hist.filter(item => item !== theme);
            hist.unshift(theme);
            if (hist.length > 10) hist.pop();
            localStorage.setItem('gayHistory', JSON.stringify(hist));
            showHistory();
        }

        function showHistory() {
            let hist = JSON.parse(localStorage.getItem('gayHistory') || '[]');
            let html = <h3>Недавние запросы</h3>;
            if (hist.length === 0) {
                html += <p style="opacity:0.6;text-align:center;">Пока пусто...</p>;
            } else {
                hist.forEach(item => {
                    html += <div class="history-item" onclick="selectHistory('${item.replace(/'/g, "\\'")}')">${item}</div>;
                });
            }
            historyEl.innerHTML = html;
        }

        window.selectHistory = function(theme) {
            queryInput.value = theme;
            searchAll();
        };

        queryInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') searchAll();
        });

        window.onload = () => {
            showHistory();
            queryInput.focus();
        };
    </script>
</body>
</html>
